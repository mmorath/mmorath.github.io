site_name: Hecate
site_description: Hecate — universal, profile-driven geo-referencing of physical objects
site_url: https://mmorath.github.io/
site_author: Matthias Morath
copyright: © 2023-2026 Matthias Morath · All rights reserved

theme:
  name: material
  logo: assets/hecate-logo.png            # transparent white mark — blends on the black header
  favicon: assets/hecate-favicon.svg      # transparent adaptive SVG — white maze on dark tabs, dark on light
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: grey
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: grey
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.top
    # navigation.instant intentionally omitted: it breaks the i18n language
    # switcher's contextual (same-page) link (mkdocs-static-i18n warns on it).
    - content.action.edit
    - toc.integrate

extra_css:
  - assets/extra.css

# English is the default (served at /); German builds at /de/ and French at
# /fr/. Pages are the un-suffixed English files; each `*.de.md` / `*.fr.md` is a
# translation, and the Material header gets a language switcher automatically.
# Adding a `plugins:` block disables the implicit `search`, so it is re-declared.
plugins:
  - search
  - i18n:
      docs_structure: suffix
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: de
          name: Deutsch
          build: true
          nav_translations:
            Overview: Überblick
            The problem: Das Problem
            What Hecate does: Was Hecate leistet
            Privacy Policy: Datenschutz
            Support: Support
        - locale: fr
          name: Français
          build: true
          nav_translations:
            Overview: Présentation
            The problem: Le problème
            What Hecate does: Ce que fait Hecate
            Privacy Policy: Confidentialité
            Support: Assistance

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      # Headings still get slug ids (so .../#in-one-minute links keep working);
      # we just don't append the visible ¶ permalink symbol next to each title.
      permalink: false
  # Render Material/Octicons :icon: shortcodes used by the grid cards as SVGs
  # rather than leaking the literal ":material-...:" text onto the page.
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

# Single-product site: Hecate is the whole site, so no "Apps" landing page and
# no "Hecate" parent group — the overview is the top of the nav. The bare root
# (index.md) just redirects to the overview, so it is intentionally not listed.
nav:
  - Overview: hecate/index.md
  - The problem: hecate/problem.md
  - What Hecate does: hecate/solution.md
  - App Store:
      - Privacy Policy: hecate/privacy.md
      - Support: hecate/support.md
