site_name: mmorath
site_description: Apps by Matthias Morath
site_url: https://mmorath.github.io/
site_author: Matthias Morath
copyright: © 2026 Matthias Morath

theme:
  name: material
  logo: assets/hecate-logo-inverse.png
  favicon: assets/hecate-logo-inverse.png
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: grey
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: grey
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.instant
    - content.action.edit
    - toc.integrate

extra_css:
  - assets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Hecate:
      - Overview: hecate/index.md
      - The problem: hecate/problem.md
      - What Hecate does: hecate/solution.md
      - App Store:
          - Privacy Policy: hecate/privacy.md
          - Support: hecate/support.md
