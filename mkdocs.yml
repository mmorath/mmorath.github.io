site_name: Hecate
site_description: Hecate — universal, profile-driven geo-referencing of physical objects
site_url: https://mmorath.github.io/
site_author: Matthias Morath
copyright: © 2023-2026 Matthias Morath · All rights reserved

theme:
  name: material
  logo: assets/hecate-logo.png            # transparent white mark — blends on the black header
  favicon: assets/hecate-favicon.svg      # transparent adaptive SVG — white maze on dark tabs, dark on light
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: grey
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: grey
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.top
    # navigation.instant intentionally omitted: it breaks the i18n language
    # switcher's contextual (same-page) link (mkdocs-static-i18n warns on it).
    - content.action.edit
    - toc.integrate

extra_css:
  - assets/extra.css

extra_javascript:
  # Per-section header brand: "Hecate · Admin" on the admin pages, "Hecate"
  # elsewhere. The header is shared (one site_name), so this adjusts it client-side.
  - assets/section-title.js

# English is the default (served at /); German builds at /de/ and French at
# /fr/. Pages are the un-suffixed English files; each `*.de.md` / `*.fr.md` is a
# translation, and the Material header gets a language switcher automatically.
# Adding a `plugins:` block disables the implicit `search`, so it is re-declared.
plugins:
  - search
  - i18n:
      docs_structure: suffix
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: de
          name: Deutsch
          build: true
          nav_translations:
            Overview: Überblick
            The problem: Das Problem
            What it does: Was sie leistet
            Capture app: Capture-App
            Apple TV viewer: Apple-TV-Viewer
            iPhone viewer: iPhone-Viewer
            Admin app: Admin-App
            Privacy: Datenschutz
            Support: Support
        - locale: fr
          name: Français
          build: true
          nav_translations:
            Overview: Présentation
            The problem: Le problème
            What it does: Ce qu'elle fait
            Capture app: Application de capture
            Apple TV viewer: Visionneuse Apple TV
            iPhone viewer: Visionneuse iPhone
            Admin app: Application admin
            Privacy: Confidentialité
            Support: Assistance

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      # Headings still get slug ids (so .../#in-one-minute links keep working);
      # we just don't append the visible ¶ permalink symbol next to each title.
      permalink: false
  # Render Material/Octicons :icon: shortcodes used by the grid cards as SVGs
  # rather than leaking the literal ":material-...:" text onto the page.
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

# One umbrella /hecate/ site bundling all three apps. The Dachseite
# (hecate/index.md) is the landing; each app is a nav group with its own
# Overview / Privacy / Support, plus standalone Support and Privacy hubs. The
# bare root (index.md) and the old /hecate-admin/ page are redirect stubs and so
# are intentionally not listed. Translations fall back to English (the i18n
# plugin serves the English page under /de/ and /fr/ when a *.de/*.fr is absent).
nav:
  - Hecate: hecate/index.md
  - Capture app:
      - Overview: hecate/capture/index.md
      - The problem: hecate/capture/problem.md
      - What it does: hecate/capture/solution.md
      - Privacy: hecate/privacy/capture/index.md
      - Support: hecate/support/operator/index.md
  - iPhone viewer:
      - Overview: hecate/viewer-ios/index.md
      - Privacy: hecate/privacy/viewer-ios/index.md
      - Support: hecate/support/operator/index.md
  - Admin app:
      - Overview: hecate/admin/index.md
      - Privacy: hecate/privacy/admin/index.md
      - Support: hecate/support/admin/index.md
  - Apple TV viewer:
      - Overview: hecate/viewer/index.md
      - Privacy: hecate/privacy/viewer/index.md
      - Support: hecate/support/operator/index.md
  - Support: hecate/support/index.md
  - Privacy: hecate/privacy/index.md
